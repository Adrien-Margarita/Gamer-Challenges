services:
  database:
    image: postgres:16-alpine
    container_name: gamerchallenge-db
    restart: unless-stopped
    ports:
      - "15432:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postgres-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: gamerchallenge-pgadmin
    restart: unless-stopped
    ports:
      - "15433:80"
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - postgres-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

networks:
  postgres-network:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data: